name: docs

# Controls when the workflow will run
on:
  # Triggers the workflow on push events
  push:
    branches: [ 'main' ]
    tags-ignore: [ '**' ]

  # Triggers the workflow on pull request events
  pull_request:

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

jobs:
  build:
    name: Build and upload documentation
    runs-on: ubuntu-latest
    strategy:
      fail-fast: True

    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Build Sphinx documentation
      uses: ammaraskar/sphinx-action@master
      with:
        docs-folder: "./docs/"
        pre-build-command: "pip install .[docs]"
        build-command: "make html"

    - name: Deploy to sites
      if: github.repository == 'ecmwf-ifs/ifsbench' && github.event_name != 'pull_request'
      env:
        SITES_TOKEN: ${{ secrets.SITES_TOKEN }}
      run: |
        mkdir -p ~/bin
        curl -o ~/bin/sites -L \
            "https://get.ecmwf.int/service/rest/v1/search/assets/download?sort=name&direction=desc&q=linux&repository=sites-cli"
        chmod a+x ~/bin/sites
        ~/bin/sites content \
          --debug \
          --space docs \
          --name ifsbench \
          --api-authentication-token="${SITES_TOKEN}" \
          upload \
            --force \
            --source "docs/build/html/" \
            --destination / \
            --recursive
